body:
  text: 洞玄靈寳上師說救護身命經爾時上師在蒲林國中坐繁華樹下臨欲昇天乃有一弟子名曰條林法淨眞人及諸得道大弟子等一切諸天人皆來集會師所各各正坐白上師言弟子等願師少坐留神布化然後昇天師告弟子族姓等於我去之後五百世中一切衆生當惡鬼衆邪蠱道奪人精氣求人長短横來殺者條林法淨眞人言亦好勤心流布此經令惡世中衆生無有病苦無有横死衆邪蠱道悉皆消滅我所囑累唯有斯經若有衆生無男無女有能讀此經一句一偈者衆邪惡鬼不得妄來侵近若在荒野中山林中若厄難中若在大火中若在大水中常當讀誦此經悉能斷除何以故此經有大威神力出元陽上品中常當讀誦若不能讀者但當著懷中至心受持此經者則得仙道善神營護若過去世未來世見在世諸弟子等皆蒙先師神力早度八難若欲遠行常當持去處處村落王化大城人民都市中行時一心爲人演說功德無量能有須臾聽者所願悉得弟子等吾不虛言此經吾上師太玄元陽仙公之所出演化祕要其難可得譬如妙藥能愈毒病能斷惡毒有人持行諸惡毒蟲衆邪蠱道欲來爭害聞此藥氣四向散去汝等一心讀誦之者諸魔鬼神不敢逥視此經神力亦復如是若有病痛者當淨洗浴身體手足頭面一心爲人讀誦衆病除愈上師復告條林法淨眞人言若有惡鬼魔兵衆邪蠱道不随我言者吾當使此魔曹送付玄都鬼律受罪如麈沙釁殃悉皆消滅無有遺餘吾即舉七仙眞人名字亦得度脫衆邪境界何等七仙眞人第一廣維衞眞人第二式法眞人第三隨葉眞人第四拘正林眞人第五拘正玄林眞人第六淨德眞人第七釋龍種眞人若有苦厄病痛者便當讀誦此七眞人名字諸惡蠱道悉皆消滅無得侵近我說此巳復憐慜告汝等我今復憐慜衆生故便演說此經元陽上部復有六神仙人名字一名羅法眞人二名羅上眞人三名加陽眞人四名懃度眞人五名頭劉眞人六名郗林眞人此是六仙人名字汝等若有衆生無男無女無貴無賤若有苦厄難者皆當誦六神仙人名字所患悉除衆惡疾氣不得來近一切滅盡無有遺餘上師告條林法淨眞人曰汝一心善聽我所陳矣若有無數弟子及諸得道眞人及諸天神王一切天人我昇天去後若有受持我所囑累妙法我等常當晝夜擁護令得安穩條林法淨眞人白上師尊弟子當於得道度世將二十五眞人於惡世中能有讀誦此經者處弟子等晝夜在其左右擁護是人衆邪魍魅𩲦𩲲不得來近常使是人卧安覺安修行善法師謂曰弟子善哉善哉汝能擁護我百千萬劫中所可修習即成神仙元陽上品第一弟子耳當說未訖復有四山神王各將眷屬部曲行正長跪又手言師尊我等於師尊昇天去後各將斯等眷屬累安行國界有能讀誦書寫受持此經我等眷屬常來隨逐是人晝夜擁護令不見惡是人故行矌野者我常隨逐導從勤力擁護不離是人不令惡鬼妄來侵近常得充足不令饑渴所欲求者我等山神王遣諸軍將吏兵悉今供給如其所願無所乏少何以故是人能流布此經修行善法供養仙寳元陽上品繫其仙簿令不斷絶說此巳復有七山神王等各各長跪又手於上師前一心稽首白師尊言我等山神王領衆無數上有百千天人常當飛行於惡世中人間有能讀誦書寫受持是元陽𨚫魔經者我等山神王與天人齊執與其眷屬共到天上是人所住之處受此法典常當守護晝夜不離其四面擁護是人衆魔惡鬼不得奪其精氣不得横來絶命不得横來擾害不得求其長短不得觸厭今毒不行我等眷屬常來在其人所住於空虚中是人若遇大火我等山神王力隨其方便救䕶其身不令大火所燒若遇大水悉決漂去我等山神王力即於空中來接是人不令見溺水即渟住得度水難若遇大賊我於四面救護是人能使賊心刀仗不舉即發慈心若遇官法繫縳枷鎻晝夜愁苦我等山神王力各各將眷屬軍將吏兵於虚空中能令其官心王歡喜悉令放赦皆得解脫我等山神王力眷屬軍將吏兵伏弩一心救護不令他縁而得擾亂於無數國土人民聚落城邑劫中常念是經何以故此經仙聖殷勤所囑之法其文流布法應宣傳若有未昇仙道士逕行林野止息樹崖者若有山神魔女崖響惡精魑魅魍魎來欲撓害之者我等山神王力能令是人不生畏想存思如故上師言吾今謂汝等山神王承從善哉善哉汝等軍將吏兵曽於過去世時至百千萬嵗劫中時值遇百千萬億諸仙上品元陽經卷第八之中濟度衆生神通第八弟子之列汝等能流布此經經法讀誦書寫方便救護不令見惡常行善法爾時山神王等與諸眷屬軍將吏兵頂禮師尊一心奉行即辭而去上師吿弟子條林法淨眞人曰吾以壬寅歳七月七日當行遠方汝等於我去後好用心我所眷屬若舉身囑累汝等唯有廣智弟子勤心流布此法令一切衆生悉得聞知族姓子汝能聽受是吾心中弟子我所出法悉付囑汝吾今憐愍一切衆生故令解脱衆難還正坐付囑此法巳復告族姓等此經尊猛極有神力令一切族姓子家男女供養香花珍果然燭續明復能轉讀誦經救人疾病苦厄之者安吉見世無復疾病將來往生文昌宫宿即生蓮華中軀體神仙備足五通無礙智慧身受八萬八千歳更還年少五通具足智勇猛健如上仙等皆元陽仙公功德如是不可稱計族姓子汝當用好紙好筆好墨至心細書寫此遺文流布國界我所岀法上下文句如吾本師元陽仙公所囑妙法無有錯誤汝無令忘失一畫一點族姓子我憐愍衆生故遺此經皆令一切有形之類悉得聞知心開意解常善念念不忘皆行往生清淨林崖夀命延長神通無礙爾時條林法淨眞人曰在世師尊前一心义手舉身肉袒身毛肆竪戰戰兢兢一心諦聽上師所語不敢忘失一句一文流淚而言師尊所囑妙法至心受持廣今流布弟子等受天尊眞教頂禮先師一心奉行師曰汝等若行若止在山林中他方國土城邑聚落人民都市帝郷縣官因獄繫中思念此經宣傳教他讀誦書寫吾當神化令汝悉得神通倍加於今頂禮師尊慘然長別元陽仙人林先生者紫陽仙第二弟子也其先出自平等離垢穢王宫是陵龍王之少子也其所祖述紫陽爲師其所儒習元陽上部其所好玩神仙第二其所纂修宴淨林野其所屬名綜繼天文始年十三止在大莊華林山中與大弟子二千人皆是修具足行諸根勇猛無復煩惱逮成仙品除七十二結心得自在其名曰條林法淨先生將二千人正在大莊華林山中歴年精思即成其第二仙品皆心不退轉利得辯才神通無礙能蹈波凌風忽逕萬里還來止在故處爾時有天人二萬諸天仙人俱復有諸天玉女二萬四千人心得自在有大龍天王羅龍天王脩忘天王吉龍天王進仙天王各將侍從神仙鹵簿來詣條林法淨先生所問元陽上品宴坐之法爾時先生四衆圍繞供養恭敬尊重讃歎爲諸弟子等說無量功德上仙上品爾時先生坐乎樹下入於無量精思岀演無量智見欲爲諸王說元陽第二即有種種天華而來蓋䕃其上普遍大衆如諸世界五通備具望上元陽神師下教即日爲汝等說元陽上品汝等好聽即當得元陽仙記爾時先生處林放大光明神通上至元陽仙亭靡不周遍下至黑暗地獄爾時諸王上視皆元陽仙府悉見彼土一切天人金城樓閣臺殿仙人玉女諸天淨宫林雲紫閣但見天人說元陽經典幷見彼方得道弟子等男女隂陽仙官受神內契種種得道人種種懇行人種種信解人種種神通人諸王見巳即問先生曰此何國界莊嚴如是先生曰此是元陽彼土多諸妙寳宫室亦有山林河海林野彼人種種因縁從心所好而求仙記或見彼國金銀城池黄金爲地白銀界側處處行廚珊瑚爲道眞珠爲繩摩尼爲牀硨磲爲池碼碯縁邊一切天人澡浴其中彼國金剛諸珍奴婢車乘寳飾輦舉有大施主至心迴向元陽仙所求著名記願得度三界第一諸仙所歎復有善人駟馬寳車欄楯華蓋軒飾宫殿其中仙人身肉手足及妻子布施求仙上品復有仙人頭面軀體欣樂施與求仙智慧有大弟子我見天人及諸明王往詣仙所問無上道便捨樂土宫殿臣妾等散髮宴坐深思泰定獲五神通而著青衣一心玄解元陽上品或見弟子而作仙人獨處閑靜樂誦經典有一弟子姓焦名林勇猛精進入於深山思惟上品有一弟子姓周名喬晝夜離欲常處空閑深修泰定得五神通有一弟子姓木名林安心定思稽首以千萬仙品讃諸仙法有一弟子姓察名林智深志固能問諸法聞悉受持備得神通次一弟子姓張名陵照明道教安國法王廣化無量功修治富種種教說次一弟子姓李名過定慧具足以無量喻爲衆講法欣樂說古化諸王子天人恭敬五通具足次一弟子姓富名林寂然宴然天人恭敬備五神通處林放光功濟天人善令入仙品次一弟子姓猛名功處林修志翼習仙靈神通具足元陽第七次一弟子姓尹名經未常睡眠經行林中勤求上品智慧神通力能移山次一弟子姓張名角威儀具戒終身無缺淨如寳珠以求仙度深心備慧以五神通第十七次一弟子姓羽名林住欲憎上慢人惡罵捶打皆悉能忍以求五通能訶有德者次一弟子姓宫名雲離諸戲歎妻子布施以求上品備得智慧神通無礙次一弟子姓姜名媯林一心除亂攝心念道萬歳遊行國界以求上眞元陽第九次一弟子姓韓名終餚饍飮食百種湯藥廣療疾病救度生死開悟衆生元陽第十三次一弟子姓賈名林千萬幢儀栴檀寶蓋衆妙卧具施給太上以求仙品如此人等元陽第十四次一弟子姓吕名子老里先生清淨園林華果茂盛流泉浴池求施上仙證爲都伯決定仙記元陽第十八次一弟子姓成名興種種廣行岀度衆生歡喜一心無有猒倦以求仙品元陽第二十次一弟子姓馬名征具足行體種種微妙說寂滅法種種教化無数衆生觀諸仙姓無有二相猶如虚空乃能分別如是人等元陽經中第二十三次一弟子姓東郭名星林心如虚空心無所著以此妙慧國界遊行求人補代如是人等元陽第二十四次一弟子姓梁名石宴坐林樹深思元陽神經妙句無量演說嚴飾國界寳臺髙妙五百由旬縱廣正等閑於此坐爲衆讃法如是之人元陽第三次一弟子姓朱名仲用行一一髙寳臺廟各千萬幢旛珠衣露幔寳鈴彌羅髙坐和鳴玉牀爲衆說法如是之人元陽第四次一弟子姓胡名林千萬智慧教諸龍王人且非人皆能仙常以香華桒供養諸仙如是之人元陽第二十七次一弟子姓㓂名林少習遊仙渉登九嶽殊越微麈供養諸仙如是之人元陽第二十九次一弟子姓趙名林少修行學廣度人民安然清淨樂誦仙品如天樹王開敷一切如是之人元陽第三十次一弟子姓嚴名平處林閑坐放一淨光我及衆生見此國界種種神力智慧希有如是之人元陽第三十一次一弟子姓子名丹多行世界事君思仙遠適山林勤求太上定慧具足常在日中我等見此得未曾有如是之人元陽第三十二洞玄靈寳上師說救護身命經
